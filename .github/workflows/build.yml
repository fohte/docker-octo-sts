name: Build image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build.yml
  pull_request:
    paths:
      - Dockerfile
      - .github/workflows/build.yml

permissions:
  contents: read

env:
  IMAGE: ghcr.io/fohte/octo-sts

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      # Required for cosign keyless signing via GitHub OIDC.
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract octo-sts version
        id: version
        run: |
          version=$(sed -n 's/^ARG OCTO_STS_VERSION=//p' Dockerfile | head -n 1)
          if [ -z "$version" ]; then
            echo "OCTO_STS_VERSION not found in Dockerfile" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Install cosign
        if: github.event_name == 'push'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Authentication is unnecessary for PR builds that do not push; log in only on push to main.
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          # Verify only that the build succeeds on PRs; publish only on push to main.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          # The version tag is reused across rebuilds, so record the source commit
          # to trace which commit a given digest was built from.
          labels: org.opencontainers.image.revision=${{ github.sha }}
          # SLSA build provenance and SBOM attestations require pushing an OCI index,
          # so generate them only on push to main.
          provenance: ${{ github.event_name == 'push' && 'mode=max' || 'false' }}
          sbom: ${{ github.event_name == 'push' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless signature bound to this workflow's OIDC identity; no key management.
      # --recursive also signs the child manifests (image, provenance, SBOM) the
      # OCI index references, not just the index manifest itself.
      - name: Sign image
        if: github.event_name == 'push'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes --recursive "${IMAGE}@${DIGEST}"
