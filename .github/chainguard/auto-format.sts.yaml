issuer: https://token.actions.githubusercontent.com

# The workflow runs on push to any branch, so the ref portion of the subject varies.
# A ref name cannot contain ':', so [^:]+ keeps the match within a single ref segment.
subject_pattern: repo:fohte/docker-octo-sts:ref:refs/heads/[^:]+

# Pin the federating workflow to test.yml so no other workflow in this repo can
# obtain a contents:write token through this policy.
claim_pattern:
  job_workflow_ref: 'fohte/docker-octo-sts/\.github/workflows/test\.yml@refs/heads/.+'

permissions:
  contents: write
