name: Build image

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/fohte/octo-sts

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract octo-sts version
        id: version
        run: |
          version=$(sed -n 's/^ARG OCTO_STS_VERSION=//p' Dockerfile | head -n 1)
          if [ -z "$version" ]; then
            echo "OCTO_STS_VERSION not found in Dockerfile" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # push しない PR ビルドでは認証不要なので、main への push 時のみログインする。
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64
          # PR ではビルドの成否のみ検証し、main への push でのみ publish する。
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
