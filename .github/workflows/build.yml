name: Build image

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/fohte/octo-sts

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Extract octo-sts version
        id: version
        run: |
          version=$(sed -n 's/^ARG OCTO_STS_VERSION=//p' Dockerfile | head -n 1)
          if [ -z "$version" ]; then
            echo "OCTO_STS_VERSION not found in Dockerfile" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      # push しない PR ビルドでは認証不要なので、main への push 時のみログインする。
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # PR ではビルドの成否のみ検証し、main への push でのみ publish する。
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
